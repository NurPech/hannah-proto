version: v2
modules:
  - path: .
    excludes:
      # npm/node_modules vendors its own .proto files (e.g. @grpc/grpc-js,
      # protobufjs) — not ours to lint/build.
      - npm/node_modules
lint:
  use:
    - BASIC
  except:
    # All protos live flat at repo root (package "hannah"), not under a
    # matching hannah/ subdirectory. Changing that means every consumer
    # (Python/Go/TypeScript) has to update its proto include path — tracked
    # as a separate, coordinated change rather than bundled into linting.
    - PACKAGE_DIRECTORY_MATCH
breaking:
  use:
    - FILE
